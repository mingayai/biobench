<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BioBench Explorer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .correct { background-color: #28a745; color: white; }
        .incorrect { background-color: #dc3545; color: white; }
        .refused { background-color: #ffc107; color: black; }
        .question-truncate { max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .navbar-brand { font-weight: bold; }
        .cb-prompt { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.5; }
        .dataset-pill { font-size: 0.75rem; vertical-align: middle; }
        .navbar .btn-outline-light {
            border-color: rgba(255,255,255,0.35);
            color: rgba(255,255,255,0.65);
        }
        .navbar .btn-outline-light:hover {
            border-color: rgba(255,255,255,0.7);
            color: white;
            background-color: rgba(255,255,255,0.12);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/{{ dataset_qs(True) }}">BioBench Explorer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/{{ dataset_qs(True) }}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/questions') %}active{% endif %}" href="/questions{{ dataset_qs(True) }}">Questions</a>
                    </li>
                    {% if current_dataset == 'bixbench' %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.path.startswith('/capsules') %}active{% endif %}" href="/capsules">Capsules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/compare' %}active{% endif %}" href="/compare">Compare Models</a>
                    </li>
                    {% endif %}
                </ul>
                <div class="d-flex align-items-center gap-1" role="group" aria-label="Dataset selector">
                    <span class="text-white-50 small me-1 d-none d-lg-inline">Dataset:</span>
                    <button type="button"
                            class="btn btn-sm {% if current_dataset == 'bixbench' %}btn-primary{% else %}btn-outline-light{% endif %} rounded-pill"
                            onclick="switchExplorerDataset('bixbench')">BixBench</button>
                    <button type="button"
                            class="btn btn-sm {% if current_dataset == 'compbiobench' %}btn-info{% else %}btn-outline-light{% endif %} rounded-pill"
                            onclick="switchExplorerDataset('compbiobench')">CompBioBench</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function switchExplorerDataset(v) {
        const path = window.location.pathname;
        const ds = v !== 'bixbench' ? '?dataset=' + v : '';
        if (path.startsWith('/questions/') && path !== '/questions') {
            window.location.href = '/questions' + ds;
            return;
        }
        if (path.startsWith('/capsules') || path === '/compare') {
            window.location.href = '/' + ds;
            return;
        }
        const u = new URL(window.location.href);
        if (v !== 'bixbench') {
            u.searchParams.set('dataset', v);
        } else {
            u.searchParams.delete('dataset');
        }
        window.location.href = u.pathname + u.search;
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
